<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 220">

<!-- frame -->
<g id="frame" fill="#cccccc">

<!-- main sofa back -->
<rect x="40" y="40" width="160" height="35" rx="12"/>

<!-- side sofa back -->
<rect x="200" y="75" width="35" height="120" rx="12"/>

<!-- left arm -->
<rect x="20" y="70" width="25" height="100" rx="12"/>

<!-- bottom arm -->
<rect x="75" y="195" width="100" height="20" rx="10"/>

<!-- main sofa body -->
<rect x="45" y="70" width="155" height="100" rx="15"/>

<!-- side sofa body -->
<rect x="200" y="70" width="60" height="125" rx="15"/>

</g>

<!-- seat cushions -->
<g id="seat" fill="#4A90E2">

<rect x="55" y="95" width="45" height="60" rx="10"/>

<rect x="105" y="95" width="45" height="60" rx="10"/>

<rect x="155" y="95" width="40" height="60" rx="10"/>

<rect x="205" y="95" width="45" height="85" rx="10"/>

</g>

</svg>