<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 120">

<!-- frame -->
<g id="frame" fill="#d9d9d9" stroke="#999" stroke-width="4">

<!-- outer frame -->
<rect x="10" y="20" width="200" height="80" rx="6" fill="#d9d9d9" stroke="none"/>

<!-- dividers -->
<line x1="60" y1="20" x2="60" y2="100"/>
<line x1="110" y1="20" x2="110" y2="100"/>
<line x1="160" y1="20" x2="160" y2="100"/>

</g>

<!-- shelf color area -->
<g id="seat" fill="#4A90E2" opacity="0.25">

<rect x="15" y="25" width="190" height="70" rx="4"/>

</g>

</svg>