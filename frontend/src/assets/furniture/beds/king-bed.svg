<!-- bed frame -->
<rect x="20" y="20" width="180" height="220" rx="16"/>

</g>

<!-- mattress -->
<g id="seat" fill="#4A90E2">

<rect x="30" y="30" width="160" height="200" rx="14"/>

</g>

<!-- pillows -->
<g id="frame" fill="#ffffff">

<rect x="35" y="35" width="65" height="35" rx="8"/>

<rect x="120" y="35" width="65" height="35" rx="8"/>

</g>

<!-- divider -->
