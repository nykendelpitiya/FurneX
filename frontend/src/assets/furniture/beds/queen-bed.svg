<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 250">

<!-- frame -->
<g id="frame" fill="#d9d9d9">

<!-- bed frame -->
<rect x="20" y="20" width="160" height="210" rx="14"/>

</g>

<!-- mattress -->
<g id="seat" fill="#4A90E2">

<rect x="30" y="30" width="140" height="190" rx="12"/>

</g>

<!-- pillows -->
<g id="frame" fill="#ffffff">

<rect x="35" y="35" width="55" height="30" rx="6"/>

<rect x="110" y="35" width="55" height="30" rx="6"/>

</g>

<!-- divider -->
